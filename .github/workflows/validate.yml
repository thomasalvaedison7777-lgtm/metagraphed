name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

# Every contributor PR runs the FULL validation — there is NO reduced "UGC"
# fast-lane. The old lane skipped the safety scans for "single community file"
# PRs and kept causing a stale-base preflight false-positive; community surfaces
# now live in one file per subnet (registry/subnets/<slug>.json) and are checked
# by the same gates as everything else (validate:surface + public-safety +
# private-boundary, all below).
#
# The DOCS FAST-LANE below is a narrower, separate thing: it does not skip any
# job or reduce the safety/security gates, including validate:private-boundary,
# for anything that could plausibly need them. It only lets a diff that is
# PURELY prose (**/*.md + .claude/skills/**) — which cannot touch registry data,
# schemas, code, or CI config — skip build/contract/registry/deploy work, while
# still reporting a real `success` conclusion (not `skipped`) on every step.
#
# The work splits across two parallel jobs that both build: `test` builds then
# runs the suite + coverage; `checks` builds then runs lint + the ~20 contract /
# schema / safety validations. They are independent — no validation needs the
# test results — so two runners make the wall-clock max(test, checks), not the
# sum. Both build because the suite's reader tests serve R2-only artifacts
# (registry-summary.json etc.) that have NO committed fallback and only exist
# after `npm run build`, so a fresh runner must stage them.
jobs:
  # Computes the docs-fast-lane eligibility for the `checks` job below. This is
  # a plain shell `git diff` inline in the trusted workflow — no third-party
  # action. (dorny/paths-filter was considered and rejected: it is published by
  # an individual GitHub user, not a GitHub-verified-creator org, and this
  # repo's Actions allowlist is `{github_owned_allowed, verified_allowed,
  # patterns_allowed: ["peter-evans/create-pull-request@*"]}` — an unlisted,
  # unverified third-party action would hit a startup_failure. Reusing the
  # existing "Compute submitted files" pattern already in `checks` avoids the
  # dependency and the allowlist question entirely.)
  #
  # `docs_only` is true only when EVERY changed path matches `**/*.md` or
  # `.claude/skills/**` (this skill directory is contributor-facing playbook
  # docs, not workflow/schema/script config). `registry_touched` is a HARD
  # GUARDRAIL, computed independently: if the diff touches anything under
  # `registry/` it force-overrides `docs_only` back to false, no matter what
  # else the diff contains. This directly encodes the incident already
  # documented above validate.yml's job comment — the old reduced "ugc" lane
  # was scoped to registry/community-surface PRs and caused a stale-base
  # preflight false-positive, so registry-touching diffs get zero special
  # treatment here, full stop.
  #
  # On push-to-main and workflow_dispatch (no base to diff against) this
  # always resolves docs_only=false — the fast lane only ever applies to a
  # `pull_request` event, where a real merge-base diff exists.
  #
  # Two further outputs, independent of docs_only and of each other: `Validate
  # workflows` (scripts/validate-workflows.mjs) reads ONLY
  # `.github/workflows/*.yml`/`.yaml`, and `Validate migration sequence`
  # (scripts/validate-migrations.mjs) reads ONLY `migrations/*.sql` — verified
  # by reading each script's full source; neither imports anything outside its
  # own directory. Each flag also matches its OWN validator script path
  # (scripts/validate-workflows.mjs / scripts/validate-migrations.mjs) directly,
  # so editing the validator's logic itself still runs it even when the diff
  # doesn't touch `.github/workflows/` or `migrations/`. A PR can be
  # workflow-only or migration-only without being a docs PR, so these are
  # computed as their own flags rather than folded into docs_only, and neither
  # needs the registry guardrail above (neither path is registry-adjacent).
  # Every other `checks` validator was evaluated for the same treatment and
  # rejected: the contract/schema/route validators
  # (validate:schemas/api/mcp/ai/openapi/types) all transitively import most of
  # `src/` + `workers/**` via `workers/api.mjs`, so no path glob short of
  # "almost the whole repo" would safely exclude them — see
  # `.claude/skills/metagraphed/reference.md`'s "new artifact/route checklist"
  # for why a route/handler change can trip a contract gate with no lexical
  # hint in the diff.
  #
  # A third, same-shape flag: `run_ui_validation` gates the `ui` job below
  # (apps/ui, the TanStack Start/Vite frontend folded in as an npm workspace —
  # #3062). Matches `^apps/ui/` OR `^packages/client/` OR `^packages/contract/`
  # -- the latter two are required, not optional: packages/client/dist/
  # index.js + index.cjs are committed (#3066/#3294), and the ui job's "Build
  # packages/client (drift check)" step is the ONLY place that verifies those
  # committed files still match a fresh build from src. A packages/client-only
  # PR (no apps/ui touch) would otherwise skip that check entirely, letting
  # stale or directly-tampered committed runtime code merge unverified (a real
  # P1 finding from Superagent on #3294 — this was fixed in response to that,
  # not written correctly the first time). packages/contract/** (#3067, the
  # shared OpenAPI-derived contract types packages/client bundles) needs the
  # same trigger for the same reason: a schema-only PR can regenerate
  # packages/contract/index.d.ts (caught fresh by `checks`' own
  # validate:contract-drift) without anyone rebuilding+committing
  # packages/client/dist to match, and that drift would only ever be caught
  # here. None of these three directories' validation touches anything outside
  # themselves, so this flag isn't registry-adjacent either, same reasoning as
  # the two flags above.
  changes:
    name: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10 # single inline git diff against the base ref, no build
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
      run_workflows_validation: ${{ steps.filter.outputs.run_workflows_validation }}
      run_migrations_validation: ${{ steps.filter.outputs.run_migrations_validation }}
      run_ui_validation: ${{ steps.filter.outputs.run_ui_validation }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Compute fast-lane eligibility
        id: filter
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            {
              echo "docs_only=false"
              echo "run_workflows_validation=true"
              echo "run_migrations_validation=true"
              echo "run_ui_validation=true"
            } >> "$GITHUB_OUTPUT"
            echo "Not a pull_request event (${{ github.event_name }}) -- full validation runs."
            exit 0
          fi

          if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ]; then
            range="$BASE_SHA...$HEAD_SHA"
          else
            git fetch origin "$BASE_REF"
            range="origin/$BASE_REF...HEAD"
          fi
          git diff --name-only "$range" > changed-files.txt

          if [ ! -s changed-files.txt ]; then
            {
              echo "docs_only=false"
              echo "run_workflows_validation=true"
              echo "run_migrations_validation=true"
              echo "run_ui_validation=true"
            } >> "$GITHUB_OUTPUT"
            echo "No changed files detected -- full validation runs."
            exit 0
          fi

          echo "Changed files:"
          cat changed-files.txt

          # Narrow, independent skips -- see the job comment above for the
          # file:line evidence that these two validators' entire footprint is
          # their own directory.
          if grep -qE '^\.github/workflows/|^scripts/validate-workflows\.mjs$' changed-files.txt; then
            echo "run_workflows_validation=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_workflows_validation=false" >> "$GITHUB_OUTPUT"
          fi
          if grep -qE '^migrations/|^scripts/validate-migrations\.mjs$' changed-files.txt; then
            echo "run_migrations_validation=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_migrations_validation=false" >> "$GITHUB_OUTPUT"
          fi
          if grep -qE '^apps/ui/|^packages/client/|^packages/contract/|^packages/ui-kit/' changed-files.txt; then
            echo "run_ui_validation=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_ui_validation=false" >> "$GITHUB_OUTPUT"
          fi

          # HARD GUARDRAIL: any registry/ path forces full validation,
          # unconditionally, regardless of every other path in the diff. See
          # the job comment above for why -- this is not a suggestion.
          if grep -qE '^registry/' changed-files.txt; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Diff touches registry/ -- forcing full validation (no exceptions)."
            exit 0
          fi

          # docs_only requires EVERY changed path to match one of the two safe
          # patterns below. A single non-matching path anywhere disqualifies
          # the whole PR from the fast lane. Both patterns require a `.md`
          # suffix -- a hypothetical future non-.md file under
          # .claude/skills/** (e.g. a template or config) must NOT qualify,
          # since only prose content is proven safe to skip validation for.
          if grep -vE '(^|/)[^/]+\.md$|^\.claude/skills/.*\.md$' changed-files.txt > /dev/null; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Diff includes non-docs paths -- full validation runs."
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "Diff is 100% **/*.md + .claude/skills/** -- docs fast lane applies to the checks job."
          fi

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 30 # build + full suite with coverage, the main per-PR gate
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Pin to the contributor's actual pushed commit, not GitHub's default
          # refs/pull/:N/merge preview -- keeps CI deterministic for a given sha
          # (a PR can't start failing just because main moved) and matches what
          # Codecov's patch status is measuring. See the coverage upload steps
          # below for why this specifically also fixes commit attribution.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.1
          cache: npm
          # Without this, setup-node's cache key hashes EVERY package-lock.json
          # in the tree (root + deploy/wss-lb), so a change to the latter's
          # lockfile would invalidate this job's cache even though `npm ci`
          # here only ever reads the root lockfile. packages/client is an npm
          # workspace (#3066) with no lockfile of its own anymore — its version
          # bumps land in the root lockfile, which this path already covers.
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      # Stage artifacts before the suite: the reader tests serve R2-only
      # artifacts that have NO committed fallback (dist/metagraph-r2/metagraph/*,
      # e.g. registry-summary.json), which only exist after a build.
      - name: Build artifacts
        env:
          METAGRAPH_PRESERVE_PROBE_HEALTH: "1"
        run: npm run build

      - name: Prepare test reports dir
        run: mkdir -p reports/junit

      # The suite runs in two non-overlapping passes (see vitest.config.mjs's
      # fileParallelism note). `test:ci` runs the parallelizable bulk — every
      # file EXCEPT five that race each other (or the shared R2 staging tree)
      # under parallel execution — concurrently WITH coverage;
      # `test:ci:artifacts` (the last step below) then runs those five
      # serially, after coverage is already captured + uploaded. Two
      # (artifacts.test.mjs, discovery-artifacts.test.mjs) are
      # filesystem-mutating artifact writers; two more (public-safety.test.mjs,
      # validate-error-messages.test.mjs) each transiently write/mutate a real
      # file validate-schemas.mjs's own full-registry scan reads, which raced
      # a concurrent registry scan in another test file (see
      # public-safety.test.mjs's header comment for the original incident
      # writeup); refresh-build-summary.test.mjs rewrites the real
      # build-summary.json at the R2 staging root in place, racing the same
      # staging tree the artifact writers above touch. All five drive their
      # work via execFileSync child processes and add zero in-process
      # coverage, so coverage comes only from `test:ci` and CI still makes a
      # single Codecov upload.
      #
      # NOTE: the `test` job intentionally does NOT participate in the docs
      # fast lane above. Coverage is a repo-wide delta gate (codecov.yml), not
      # diff-scoped, so shortcutting it on a docs-only PR would let a docs PR
      # merge without an accurate coverage report. It's also not the wall-clock
      # long pole when it does run alongside a fast `checks` job.
      - name: Test (parallel, with coverage gate)
        env:
          VITEST_JUNIT_PATH: reports/junit/vitest.xml
        run: npm run test:ci

      - name: Verify coverage report exists
        run: test -s coverage/lcov.info

      # Upload coverage to Codecov — the primary PR coverage gate (delta-based
      # project + patch, see codecov.yml). vitest's thresholds are now just a
      # local backstop. Same-repo PRs and main pushes use the repository token;
      # fork PRs use Codecov's public-repo tokenless upload path instead.
      # Missing coverage or upload errors fail the test job.
      #
      # Explicit override_branch/commit/pr on BOTH paths below: GITHUB_SHA is the
      # ephemeral refs/pull/:N/merge commit on pull_request events, and the
      # checkout step above pins to the real head sha instead (so tests run the
      # contributor's actual commit) -- so auto-detection would otherwise attach
      # the report to a merge sha that never appears in the PR's own checks list.
      - name: Upload coverage to Codecov
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          disable_search: true
          override_branch: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          override_commit: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          override_pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          fail_ci_if_error: true

      # override_branch is prefixed with the fork owner (owner:branch): Codecov only treats a branch
      # string with a colon-separated prefix as "unprotected"/tokenless-eligible; a bare branch name
      # looks like it could be a real (possibly protected) branch on the base repo and gets rejected with
      # "Token required because branch is protected" even with zero token configuration anywhere.
      # codecov-cli's own auto-detection never adds this prefix either (verified in its source), so it
      # must be supplied explicitly. override_commit/override_pr are unaffected -- that check only
      # inspects the branch string.
      - name: Upload coverage to Codecov (fork PR tokenless)
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/lcov.info
          disable_search: true
          override_branch: ${{ github.event.pull_request.head.repo.owner.login }}:${{ github.event.pull_request.head.ref }}
          override_commit: ${{ github.event.pull_request.head.sha }}
          override_pr: ${{ github.event.pull_request.number }}
          fail_ci_if_error: true

      - name: Upload Vitest results to Codecov
        if: ${{ !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./reports/junit/vitest.xml
          report_type: test_results
          disable_search: true
          override_branch: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          override_commit: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          override_pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          fail_ci_if_error: false

      - name: Upload Vitest results to Codecov (fork PR tokenless)
        if: ${{ !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./reports/junit/vitest.xml
          report_type: test_results
          disable_search: true
          override_branch: ${{ github.event.pull_request.head.repo.owner.login }}:${{ github.event.pull_request.head.ref }}
          override_commit: ${{ github.event.pull_request.head.sha }}
          override_pr: ${{ github.event.pull_request.number }}
          fail_ci_if_error: false

      # The two filesystem-mutating artifact writers, run serially LAST so they
      # never overlap the parallel readers above and coverage is already
      # uploaded. They mutate the same on-disk artifact tree, so they cannot run
      # concurrently with each other either — the serial default applies. This is
      # a pure correctness gate (no coverage); a failure here still fails the job.
      - name: Test (artifact writers, serial)
        run: npm run test:ci:artifacts

  checks:
    name: checks
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 30 # build plus the ~20 contract/schema/registry/safety validators
    env:
      # A single guard expression, computed once, that every expensive step
      # below gates on. Deliberately a per-STEP `if:`, not a job-level `if:`
      # on `checks` itself: a job-level skip reports conclusion=skipped, and
      # while Gittensory's own CI aggregate (fetchLiveCiAggregate) buckets
      # skipped identically to success, GitHub's native required-status-check
      # semantics for a *future* required context are not governed by that
      # code path. Per-step guards keep this job always reporting a real
      # success/failure conclusion, which is unconditionally safe under both
      # systems, at the cost of a few extra seconds on the one self-hosted
      # runner for `Setup Node` + `Install` + the guard evaluation itself.
      DOCS_ONLY: ${{ needs.changes.outputs.docs_only }}
      RUN_WORKFLOWS_VALIDATION: ${{ needs.changes.outputs.run_workflows_validation }}
      RUN_MIGRATIONS_VALIDATION: ${{ needs.changes.outputs.run_migrations_validation }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Same pin as the `test` job's checkout -- keep both jobs testing the
          # identical commit.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      # Compute the deletion-filtered list of files this PR submits, inline in the
      # trusted workflow (PR contents are untrusted). It feeds ONLY the
      # reproducible-artifact verifier below, which diff-scopes its check to the
      # files actually changed. There is no reduced lane to forge — every PR runs
      # the full validation regardless of this list.
      - name: Compute submitted files
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ]; then
              git diff --name-only --diff-filter=d "$BASE_SHA"..."$HEAD_SHA" > submitted-artifact-files.txt
            else
              git fetch origin "$BASE_REF"
              git diff --name-only --diff-filter=d "origin/$BASE_REF"...HEAD > submitted-artifact-files.txt
            fi
          else
            : > submitted-artifact-files.txt
          fi

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.1
          cache: npm
          # See the `test` job's Setup Node step for why this is needed --
          # same over-scoped-cache-key issue applies here.
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      # Report-only SCA for the ROOT workspace — workers/** (the Worker API, MCP
      # server, webhook dispatcher), src/**, and scripts/** — the repo's larger,
      # more security-sensitive dependency surface, which until now had strictly
      # less CI coverage than apps/ui (#5543). Same posture as the apps/ui CVE
      # scan in the `ui` job below and the gate #1772 established: surface
      # high/critical runtime advisories at PR time without failing the job
      # (Renovate is async/non-blocking, so a feature PR can still merge a
      # vulnerable transitive dep between Renovate runs). No `--workspace` flag,
      # so this audits the whole lockfile — a superset that necessarily covers
      # the root deps this gap is about; the minor overlap with the apps/ui-
      # scoped scan is harmless since both are report-only. Never `--force`.
      # Tighten to blocking once it stays clean.
      - name: Dependency CVE scan (SCA, report-only)
        run: |
          npm audit --audit-level=high --omit=dev \
            || echo "::warning::npm audit found high/critical advisories in the root workspace's runtime dependencies — review above (report-only; not failing CI yet)"

      # Lint + format + the documentation/intake/safety/security scans below
      # run UNCONDITIONALLY, docs fast lane or not — they're cheap (no build,
      # no network), and directly relevant to a docs-only diff (a stray secret,
      # private-boundary leak, broken doc-contract reference, or malformed
      # intake template can land in a "docs-only" PR just as easily as in a
      # code PR).
      - name: Lint + format
        run: |
          npm run lint
          npm run format:check

      # Drift gate: these compare the COMMITTED contract (openapi.json, the schema
      # bundle, generated types + client) against what the schemas regenerate, so
      # they MUST run before the build step below overwrites those committed files.
      # This is the gate CONTRIBUTING.md references — without it a stale or
      # hand-edited committed contract could land on main undetected.
      #
      # Skipped for a proven docs-only diff: **/*.md + .claude/skills/** cannot
      # touch schemas/, openapi.json, or any generated contract file, so there
      # is nothing for this to drift-check.
      - name: Validate committed contract (drift)
        if: env.DOCS_ONLY != 'true'
        run: |
          npm run validate:contract-drift
          npm run validate:schema-enums
          npm run validate:openapi-examples
          npm run validate:generated-client
          npm run validate:committed-seed

      - name: Build artifacts
        if: env.DOCS_ONLY != 'true'
        env:
          METAGRAPH_PRESERVE_PROBE_HEALTH: "1"
        run: npm run build

      - name: Verify submitted public artifacts are reproducible
        if: env.DOCS_ONLY != 'true' && github.event_name == 'pull_request'
        run: node scripts/ci-verify-submitted-artifacts.mjs --changed-files submitted-artifact-files.txt

      - name: Validate registry
        if: env.DOCS_ONLY != 'true'
        run: npm run validate

      - name: Generate R2 manifest
        if: env.DOCS_ONLY != 'true'
        run: npm run r2:manifest

      # #1025: committed derived artifacts under public/ must match a fresh
      # build. The validators above run AFTER `npm run build`, so they only ever
      # see freshly-rebuilt files — never the committed-stale ones — and
      # ci-verify is diff-scoped, so a source-only PR never re-checks untouched
      # derived files. This gate closes that silent-drift hole: a full rebuild
      # has just run (build + r2:manifest), so any working-tree change here means
      # a committed artifact was left stale. The deterministic derived artifacts
      # use a fixed reproducible `generated_at` placeholder; the R2-only dist/
      # tree is gitignored and excluded automatically.
      #
      # r2-manifest.json is excluded: its `*_artifact_size_bytes` totals sum the
      # R2-only artifacts, whose byte sizes vary slightly build-to-build, so it
      # is inherently non-deterministic. It is publish infrastructure regenerated
      # on every publish (and by the r2:manifest step above), so its committed
      # copy is a best-effort lockfile, not a served/contract surface.
      #
      # Skipped on the docs fast lane along with the "Build artifacts" step it
      # depends on above -- there is no fresh build to diff against.
      - name: Verify committed derived artifacts are fresh
        if: env.DOCS_ONLY != 'true'
        run: |
          # Only CONTRACT artifacts are gated here — openapi.json / types.d.ts /
          # contracts.json / api-index.json — because they change only with reviewed
          # schema/source PRs and MUST be regenerated + committed. DATA/CONTENT-derived
          # artifacts are NOT gated: they re-drift on every registry/data edit and would
          # red-line build-less community surface PRs (the single-file model makes adding
          # a surface a one-file data PR). Those are handled out-of-band: public/datasets/
          # + the llms.txt catalogs are gitignored (rebuilt + served via ASSETS on
          # deploy); r2-manifest.json is the publish lockfile; schemas/index.json is a
          # network-capture cache the build reconciles in place (a new openapi surface
          # legitimately adds a not-captured placeholder); and operational-surfaces.json
          # is CONTENT-derived — the prober's input list regenerates whenever a
          # probe-enabled, public-safe operational-kind surface (subnet-api / sse /
          # data-artifact / wss / rpc) is added or changed, which a one-file community
          # surface PR does NOT regenerate (there is no authority/review gate on that
          # list). It stays committed so the prober's ASSETS read succeeds on a cold
          # start, but the served copy is rebuilt fresh on every deploy — so a
          # momentarily-stale git copy is a tolerated cache, not a runtime fault.
          excludes=(
            ':(exclude)public/metagraph/r2-manifest.json'
            ':(exclude)public/metagraph/schemas/index.json'
            ':(exclude)public/metagraph/operational-surfaces.json'
            ':(exclude)public/datasets'
          )
          status=$(git status --porcelain --untracked-files=all -- public/ "${excludes[@]}")
          if [ -n "$status" ]; then
            echo "::error::Committed derived artifacts under public/ are stale (a fresh build changed, deleted, or recreated them). Run 'npm run build' and commit the result."
            printf '%s\n' "$status"
            git diff --name-only -- public/ "${excludes[@]}"
            git diff --stat -- public/ "${excludes[@]}"
            exit 1
          fi
          echo "All committed derived artifacts under public/ match a fresh build."

      - name: Validate JSON schemas
        if: env.DOCS_ONLY != 'true'
        run: npm run validate:schemas

      - name: Validate Worker API
        if: env.DOCS_ONLY != 'true'
        run: npm run validate:api

      - name: Validate MCP server
        if: env.DOCS_ONLY != 'true'
        run: npm run validate:mcp

      - name: Validate AI routes
        if: env.DOCS_ONLY != 'true'
        run: npm run validate:ai

      - name: Validate OpenAPI
        if: env.DOCS_ONLY != 'true'
        run: npm run validate:openapi

      - name: Validate generated API types
        if: env.DOCS_ONLY != 'true'
        run: npm run validate:types

      # Client-SDK drift gate: a contract-only PR (schemas → generated →
      # openapi.json) is NOT under packages/client/**, so release-please never
      # bumps the `client` component and the published @jsonbored/metagraphed
      # silently lags the live contract. This fails the PR when a contract file
      # changed versus the merge base but packages/client/package.json "version"
      # was not bumped. Diff-scoped: non-contract PRs never fire.
      - name: Validate client-SDK sync (contract ↔ published version)
        if: env.DOCS_ONLY != 'true' && github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npm run validate:client-sdk-sync

      - name: Validate artifact size budgets
        if: env.DOCS_ONLY != 'true'
        run: npm run validate:artifact-budgets

      # Always runs, docs fast lane or not: cheap (reads README.md +
      # docs/backend-artifact-contracts.md + src/contracts.mjs, no build, no
      # network) and this is exactly the gate a docs-only PR is most likely to
      # need — the repo's own docs-only.md PR template lists it first.
      - name: Validate documentation contracts
        run: npm run validate:docs

      # NOTE: the README subnet catalog is intentionally NOT gated here. It is a
      # DATA-derived listing (regenerated by `npm run readme:catalog` from
      # registry/subnets/), so gating it red-lined build-less community surface
      # PRs that legitimately change a subnet's catalog row. README freshness is
      # owned out-of-band by .github/workflows/readme-catalog-refresh.yml, which
      # accumulates drift into a single chore/readme-catalog PR on every
      # registry/subnets push. (Same rationale as the gitignored llms.txt
      # catalogs + public/datasets — DATA artifacts are not PR-gated.)

      # Always runs (see docs/backend-artifact-contracts.md rationale above):
      # cheap file-only scan of .github/ISSUE_TEMPLATE + the PR template, no
      # build required, and listed in docs-only.md's own checklist.
      - name: Validate intake templates
        run: npm run validate:intake

      - name: Validate registry subnet files
        if: env.DOCS_ONLY != 'true'
        run: npm run validate:surface

      # Narrow, independent skip (not tied to DOCS_ONLY): scripts/validate-workflows.mjs
      # reads ONLY .github/workflows/*.yml/.yaml, so a PR with zero changes under
      # that path cannot affect this validator's result. See the `changes` job
      # comment for the full rationale.
      - name: Validate workflows
        if: env.RUN_WORKFLOWS_VALIDATION == 'true'
        run: npm run validate:workflows

      # Narrow, independent skip (not tied to DOCS_ONLY): scripts/validate-migrations.mjs
      # reads ONLY migrations/*.sql, so a PR with zero changes under that path
      # cannot affect this validator's result. See the `changes` job comment for
      # the full rationale.
      - name: Validate migration sequence
        if: env.RUN_MIGRATIONS_VALIDATION == 'true'
        run: npm run validate:migrations

      - name: Validate Cloudflare config
        if: env.DOCS_ONLY != 'true'
        run: npm run cloudflare:verify:dry-run

      - name: Validate R2 manifest
        if: env.DOCS_ONLY != 'true'
        run: |
          npm run r2:manifest:dry-run
          npm run r2:download:dry-run
          npm run kv:publish:dry-run

      - name: Worker deploy dry-run
        if: env.DOCS_ONLY != 'true'
        run: npm run worker:deploy:dry-run

      - name: Worker bundle-size budget
        if: env.DOCS_ONLY != 'true'
        run: npm run worker:bundle:budget

      # Always runs, docs fast lane or not: a plain regex scan over
      # README/docs/registry/schemas/public/.github/workers/wrangler.jsonc for
      # secrets, private paths, and localhost URLs (scripts/scan-public-
      # safety.mjs) — no build, no network, and the exact gate a docs edit
      # could most plausibly trip (a pasted local path or token in a doc).
      - name: Public-safety scan
        run: npm run scan:public-safety

      # Always runs, docs fast lane or not: this scans all tracked files,
      # including Markdown, for private review internals and provider-private
      # routes. It is a security boundary, not a build/contract gate.
      - name: Validate private boundary
        run: npm run validate:private-boundary

  # The Python SDK (python/) ships its own hermetic unittest suite (37 cases) but
  # was never run in CI — a regression in retry/backoff, Retry-After capping,
  # pagination, JSON-RPC unwrap, or the SSRF-safe redirect handler could land on a
  # PR (and reach PyPI) despite covering tests existing. This job runs it on every
  # PR. It is independent of the Node jobs, so it adds no wall-clock to the
  # test/checks long poles.
  python:
    name: python
    runs-on: ubuntu-latest
    timeout-minutes: 15 # hermetic unittest suite (37 cases), no network
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      # `--extra test` installs the httpx-backed test deps (declared in pyproject's
      # [test] extra) so the async cases run instead of skipping. uv provisions a
      # Python within `requires-python = ">=3.9"`. No new runtime dependency.
      - name: Test Python SDK
        working-directory: python
        run: uv run --extra test python -m unittest discover -s tests

  # apps/ui (TanStack Start/Vite frontend, #3062) — entirely independent of the
  # backend jobs above: a backend-only PR never installs or builds this tree,
  # and vice versa. Gated on run_ui_validation (see the `changes` job comment)
  # via the SAME per-step guard pattern `checks` uses for its docs fast lane —
  # never a job-level `if:`, so this job always reports a real success/failure
  # conclusion rather than `skipped`.
  ui:
    name: ui
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 30 # workspace install, drift-check builds, typecheck/test, and the Playwright e2e pass
    env:
      RUN_UI_VALIDATION: ${{ needs.changes.outputs.run_ui_validation }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node
        if: env.RUN_UI_VALIDATION == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: package-lock.json

      # Installs the whole workspace tree (root + apps/ui + packages/client)
      # from the one root lockfile -- there is no way to `npm ci` a single
      # workspace in isolation.
      - name: Install
        if: env.RUN_UI_VALIDATION == 'true'
        run: npm ci

      # apps/ui consumes packages/client as a live workspace link (#3066), not
      # a published package. packages/client/dist/index.js + index.cjs (the
      # RUNTIME bundle only, NOT the .d.ts type declarations -- see
      # packages/client/.gitignore) ARE committed specifically so Cloudflare
      # Workers Builds' live deploy never has to build them: that build
      # depends on `tsup` resolving correctly via PATH inside a `cd`'d-into
      # workspace directory, which real Workers Builds runs hit failing in
      # ways this repo's own environment never reproduced (npm
      # hoisting/caching differences between environments) -- eliminating
      # the build-at-deploy-time step entirely removes that whole failure
      # class. Deliberately NOT a package.json "prepare" script either: that
      # would auto-run the build on every `npm install`/`ci` for anyone in
      # the repo, which a security scan flagged as unnecessary install-time
      # code execution (#3066 review). This step exists purely as a DRIFT
      # CHECK: rebuild fresh and diff against the committed copy (`git diff`
      # only considers tracked files, so the gitignored .d.ts is naturally
      # excluded here without any extra scoping), so an edit to
      # packages/client/src without a matching
      # `npm run build --workspace=packages/client` + commit of the runtime
      # bundle fails loudly here rather than shipping stale runtime code.
      - name: Build packages/client (drift check)
        if: env.RUN_UI_VALIDATION == 'true'
        run: |
          npm run build --workspace=packages/client
          if ! git diff --exit-code -- packages/client/dist; then
            echo "::error::packages/client/dist is stale -- run 'npm run build --workspace=packages/client' and commit the result."
            exit 1
          fi

      # Same drift-check shape as packages/client above, same reason:
      # packages/ui-kit/dist/{index.js,index.cjs,index.css} are committed
      # (see packages/ui-kit/.gitignore) so apps/ui's Cloudflare Workers
      # Builds deploy never depends on rebuilding a sibling workspace
      # package first (#4860).
      - name: Build packages/ui-kit (drift check)
        if: env.RUN_UI_VALIDATION == 'true'
        run: |
          npm run build --workspace=packages/ui-kit
          if ! git diff --exit-code -- packages/ui-kit/dist; then
            echo "::error::packages/ui-kit/dist is stale -- run 'npm run build --workspace=packages/ui-kit' and commit the result."
            exit 1
          fi

      # Same drift-check shape as packages/client/packages/ui-kit above
      # (#1652's docs-freshness acceptance line): content/docs/api-reference/
      # is entirely generated from public/metagraph/openapi.json (except the
      # one hand-written index.mdx the generator itself preserves) -- a
      # contract-changing PR that forgets to re-run the generator ships
      # stale/missing docs pages silently otherwise (caught live 2026-07-18:
      # two newly-merged routes had zero corresponding doc pages).
      - name: Build API reference docs (drift check)
        if: env.RUN_UI_VALIDATION == 'true'
        working-directory: apps/ui
        run: |
          node scripts/generate-openapi-docs.mjs
          if ! git diff --exit-code -- content/docs/api-reference; then
            echo "::error::apps/ui/content/docs/api-reference is stale -- run 'node scripts/generate-openapi-docs.mjs' (from apps/ui) and commit the result."
            exit 1
          fi

      # Same drift-check shape as the API reference docs step just above
      # (#6634, the #1652 acceptance line that was never actually built):
      # content/docs/catalog.mdx is entirely generated from the curated
      # registry/subnets/ overlays via scripts/lib/readme-catalog.mjs (the
      # same renderer README.md's own catalog section uses) -- an enriched
      # subnet that never regenerates this page silently drifts otherwise.
      - name: Build subnet catalog docs (drift check)
        if: env.RUN_UI_VALIDATION == 'true'
        working-directory: apps/ui
        run: |
          node scripts/generate-catalog-docs.mjs
          if ! git diff --exit-code -- content/docs/catalog.mdx; then
            echo "::error::apps/ui/content/docs/catalog.mdx is stale -- run 'node scripts/generate-catalog-docs.mjs' (from apps/ui) and commit the result."
            exit 1
          fi

      - name: Typecheck packages/ui-kit
        if: env.RUN_UI_VALIDATION == 'true'
        run: npm run typecheck --workspace=packages/ui-kit

      - name: Test packages/ui-kit
        if: env.RUN_UI_VALIDATION == 'true'
        run: npm test --workspace=packages/ui-kit

      # Enforces the #4867 epic's core invariant: packages/ui-kit stays a
      # real, standalone library. no-restricted-imports (packages/ui-kit/
      # eslint.config.js) fails on @tanstack/react-router,
      # @tanstack/react-query, or any import resolving into apps/ui/**.
      - name: Lint packages/ui-kit (app-logic import guardrail)
        if: env.RUN_UI_VALIDATION == 'true'
        run: npm run lint --workspace=packages/ui-kit

      - name: Lint (ESLint + Prettier)
        if: env.RUN_UI_VALIDATION == 'true'
        run: npm run lint --workspace=apps/ui && npm run format:check --workspace=apps/ui

      - name: Typecheck
        if: env.RUN_UI_VALIDATION == 'true'
        run: npm run typecheck --workspace=apps/ui

      - name: Test
        if: env.RUN_UI_VALIDATION == 'true'
        run: npm test --workspace=apps/ui

      # Uses the @playwright/test devDependency already installed by `npm ci`
      # above (not a fresh npx fetch) -- installs just its matching browser
      # binary, no separate version to keep in sync.
      - name: Install Playwright Chromium
        if: env.RUN_UI_VALIDATION == 'true'
        working-directory: apps/ui
        run: npx playwright install --with-deps chromium

      # Baseline-diff, not zero-tolerance -- see responsive-overflow.spec.ts.
      # Fails only on a NEW element escaping the viewport that isn't already
      # in the known baseline, so this doesn't block on the existing tracked
      # overflow backlog (#3930, #3931, #3985, etc.).
      - name: Responsive overflow check (e2e)
        if: env.RUN_UI_VALIDATION == 'true'
        run: npm run test:e2e --workspace=apps/ui

      # LOVABLE_SANDBOX force-enables Nitro's cloudflare-module preset outside
      # Lovable's own environment (the preset otherwise emits a static-only
      # client build with no Worker entry) -- matches the exact env Cloudflare
      # Workers Builds sets in production (see apps/ui/DEPLOY.md).
      - name: Build
        if: env.RUN_UI_VALIDATION == 'true'
        env:
          LOVABLE_SANDBOX: "1"
          NITRO_PRESET: cloudflare-module
        run: npm run build --workspace=apps/ui

      # Guard against client-bundle regressions. Measures the INITIAL client
      # transfer for a cold visit to "/" -- the entry chunk plus the transitive
      # closure of its STATIC imports (the shared/vendor graph), deliberately
      # excluding lazily-loaded route chunks (dynamic import()), which the
      # browser never fetches on first paint. Source of truth is TanStack
      # Start's per-route preload manifest
      # (dist/server/_tanstack-start-manifest_v-*.mjs): each route's
      # `preloads` is its static module graph, so the cold first-load set is
      # __root__ (the entry) ∪ the "/" route's preloads. Budget is ~28% above
      # the current ~233 KB gzipped baseline; raise it deliberately (in the
      # same PR) when a real feature legitimately grows the initial load.
      #
      # dist/, not Nitro's library-default .output/ -- this project's
      # vite.config.ts (@lovable.dev/vite-tanstack-config) is customized to
      # output there instead (confirmed against a real local + CI build; the
      # standalone repo's own now-removed ci.yml had this as `.output/...`,
      # which never actually matched this project's real build output).
      - name: Bundle size budget (initial client JS, gzipped)
        if: env.RUN_UI_VALIDATION == 'true'
        working-directory: apps/ui
        env:
          BUDGET_KB: 300
        run: |
          node --input-type=module <<'NODE'
          import { readdirSync, readFileSync } from "node:fs";
          import { gzipSync } from "node:zlib";
          import path from "node:path";

          const PUBLIC_DIR = "dist/client";
          const SERVER_DIR = "dist/server";

          const manifestFile = readdirSync(SERVER_DIR).find((f) =>
            /^_tanstack-start-manifest_v-.*\.mjs$/.test(f),
          );
          if (!manifestFile) {
            console.error(
              "::error::Could not find the TanStack Start manifest (_tanstack-start-manifest_v-*.mjs) in " +
                SERVER_DIR +
                " — the bundle-size gate cannot measure the initial load. Did the build setup change?",
            );
            process.exit(1);
          }

          const mod = await import(path.resolve(SERVER_DIR, manifestFile));
          const accessor = mod.default ?? Object.values(mod).find((v) => typeof v === "function");
          const manifest = typeof accessor === "function" ? accessor() : accessor;
          const routes = manifest?.routes;
          if (!routes?.__root__) {
            console.error("::error::Manifest has no routes/__root__ — cannot determine the entry chunk.");
            process.exit(1);
          }

          const rootPreloads = routes.__root__.preloads ?? [];
          const homePreloads = routes["/"]?.preloads ?? [];
          const initial = [...new Set([...rootPreloads, ...homePreloads])].filter((f) =>
            f.endsWith(".js"),
          );
          if (initial.length === 0) {
            console.error("::error::No initial JS preloads found in the manifest — refusing to report 0 KB.");
            process.exit(1);
          }

          const buffers = initial
            .sort()
            .map((f) => readFileSync(path.join(PUBLIC_DIR, f.replace(/^\//, ""))));
          const bytes = gzipSync(Buffer.concat(buffers)).length;
          const kb = Math.ceil(bytes / 1024);

          const BUDGET_KB = Number(process.env.BUDGET_KB ?? 300);
          console.log(
            `Initial client JS (entry + static-import closure, gzipped): ${kb} KB / budget ${BUDGET_KB} KB  [${initial.length} chunks, lazy route chunks excluded]`,
          );
          if (kb > BUDGET_KB) {
            console.error(
              `::error::Initial client JS ${kb} KB exceeds the ${BUDGET_KB} KB budget — investigate the regression or raise the budget deliberately.`,
            );
            process.exit(1);
          }
          NODE

      # Report-only SCA (same posture as the CVE scan the standalone repo's own
      # CI ran) -- surfaces high/critical runtime-dependency advisories at PR
      # time without failing the job. Tighten to blocking once it stays clean.
      - name: Dependency CVE scan (SCA, report-only)
        if: env.RUN_UI_VALIDATION == 'true'
        run: |
          npm audit --audit-level=high --omit=dev --workspace=apps/ui \
            || echo "::warning::npm audit found high/critical advisories in apps/ui's runtime dependencies — review above (report-only; not failing CI yet)"
